<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FaceAttend — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0D0D0F;--surface:#16161A;--surface2:#1E1E24;
  --border:rgba(255,255,255,0.07);--text:#F0EEE8;--muted:#7A7880;
  --accent:#C8F04A;--accent-dim:rgba(200,240,74,0.12);
  --green:#6BCF7F;--blue:#42B4F5;--yellow:#F5C842;--red:#F55050;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2rem;border-bottom:1px solid var(--border);background:rgba(13,13,15,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
.logo{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;display:flex;align-items:center;gap:8px;}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;}
.nav-tag{font-size:11px;font-weight:700;font-family:'Syne',sans-serif;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);background:var(--accent-dim);padding:4px 12px;border-radius:999px;}
.refresh-btn{font-size:12px;color:var(--muted);background:transparent;border:1px solid var(--border);padding:6px 14px;border-radius:999px;cursor:pointer;font-family:'Instrument Sans',sans-serif;transition:all 0.15s;}
.refresh-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.12);}
.page{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem;}
.page-header{margin-bottom:1.75rem;}
.page-title{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:14px;color:var(--muted);}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:2rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem;}
.stat-icon{font-size:20px;margin-bottom:8px;}
.stat-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;}
.stat-value{font-family:'Syne',sans-serif;font-size:2rem;font-weight:700;line-height:1;}
.stat-card.today .stat-value{color:var(--accent);}
.stat-card.total .stat-value{color:var(--blue);}
.stat-card.persons .stat-value{color:var(--yellow);}
.two-col{display:grid;grid-template-columns:1fr 1.8fr;gap:16px;margin-bottom:2rem;}
@media(max-width:700px){.two-col{grid-template-columns:1fr;}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;margin-bottom:1.25rem;}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.bar-label{font-size:13px;color:var(--muted);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;height:8px;background:var(--surface2);border-radius:999px;overflow:hidden;}
.bar-fill{height:100%;background:var(--accent);border-radius:999px;transition:width 1s cubic-bezier(.4,0,.2,1);}
.bar-num{font-size:13px;font-weight:500;color:var(--accent);width:24px;text-align:right;flex-shrink:0;}
.empty-state{text-align:center;padding:2rem;color:var(--muted);font-size:14px;}
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;}
.filter-btn{font-size:12px;padding:5px 12px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Instrument Sans',sans-serif;transition:all 0.15s;}
.filter-btn:hover{color:var(--text);}
.filter-btn.active{background:var(--accent);color:#0D0D0F;border-color:var(--accent);font-weight:500;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);padding:10px 1.5rem;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2);}
td{padding:12px 1.5rem;font-size:14px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.td-name{font-weight:500;color:var(--text);}
.td-date{color:var(--muted);}
.td-time{color:var(--muted);}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500;background:rgba(107,207,127,0.12);color:var(--green);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.no-data{text-align:center;color:var(--muted);padding:3rem;font-size:14px;}
</style>
</head>
<body>
<nav>
  <div class="logo"><div class="logo-dot"></div>FaceAttend</div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="live-dot"></div>
    <span class="nav-tag">Live Dashboard</span>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-title">Attendance Dashboard</div>
    <div class="page-sub" id="todayLabel">Loading...</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card today">
      <div class="stat-icon">✅</div>
      <div class="stat-label">Present Today</div>
      <div class="stat-value" id="statToday">—</div>
    </div>
    <div class="stat-card total">
      <div class="stat-icon">📋</div>
      <div class="stat-label">Total Records</div>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat-card persons">
      <div class="stat-icon">👥</div>
      <div class="stat-label">Registered</div>
      <div class="stat-value" id="statPersons">—</div>
    </div>
  </div>

  <div class="two-col">
    <div class="card">
      <div class="card-title">Attendance by Person</div>
      <div id="barChart"><div class="empty-state">No data yet</div></div>
    </div>
    <div class="card">
      <div class="card-title">Today's Attendance</div>
      <div id="todayList"><div class="empty-state">No one marked today</div></div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <div class="card-title" style="margin:0;">All Records</div>
      <div class="filter-row" id="filterRow">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Date</th>
            <th>Time</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="5" class="no-data">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
let allRecords = [];
let currentFilter = 'all';

async function loadAll() {
  try {
    const [attRes, statsRes] = await Promise.all([
      fetch('/api/attendance'),
      fetch('/api/stats')
    ]);
    const att   = await attRes.json();
    const stats = await statsRes.json();

    document.getElementById('statToday').textContent   = att.present_today;
    document.getElementById('statTotal').textContent   = att.total;
    document.getElementById('statPersons').textContent = att.persons.length;
    document.getElementById('todayLabel').textContent  = 'Today: ' + att.today;

    allRecords = att.records;

    // Bar chart
    const maxCount = Math.max(...stats.counts, 1);
    const barHtml  = stats.labels.length
      ? stats.labels.map((name, i) => `
        <div class="bar-row">
          <span class="bar-label" title="${name}">${name}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${stats.counts[i]/maxCount*100}%"></div></div>
          <span class="bar-num">${stats.counts[i]}</span>
        </div>`).join('')
      : '<div class="empty-state">No data yet</div>';
    document.getElementById('barChart').innerHTML = barHtml;

    // Today's list
    const todayRec = att.records.filter(r => r.Date === att.today);
    document.getElementById('todayList').innerHTML = todayRec.length
      ? todayRec.map(r => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
          <span style="font-weight:500;">${r.Name}</span>
          <span style="font-size:13px;color:var(--muted);">${r.Time}</span>
        </div>`).join('')
      : '<div class="empty-state">No one marked today</div>';

    // Filter buttons
    const persons = att.persons;
    const filterRow = document.getElementById('filterRow');
    filterRow.innerHTML = `<button class="filter-btn ${currentFilter==='all'?'active':''}" onclick="setFilter('all',this)">All</button>`;
    persons.forEach(p => {
      filterRow.innerHTML += `<button class="filter-btn ${currentFilter===p?'active':''}" onclick="setFilter('${p}',this)">${p}</button>`;
    });

    renderTable();
  } catch(e) {
    console.log('Error loading data:', e);
  }
}

function renderTable() {
  const filtered = currentFilter === 'all'
    ? allRecords
    : allRecords.filter(r => r.Name === currentFilter);

  const tbody = document.getElementById('tableBody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="no-data">No records found</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map((r, i) => `
    <tr>
      <td style="color:var(--muted);font-size:12px;">${i+1}</td>
      <td class="td-name">${r.Name}</td>
      <td class="td-date">${r.Date}</td>
      <td class="td-time">${r.Time}</td>
      <td><span class="status-badge">✓ Present</span></td>
    </tr>
  `).join('');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

loadAll();
setInterval(loadAll, 10000); // Auto refresh every 10s
</script>
</body>
</html>
